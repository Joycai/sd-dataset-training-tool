name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # This is a Flutter app (flutter/flutter_localizations SDK deps), so it
      # needs the Flutter toolchain rather than a bare Dart SDK.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.7
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify localizations are up to date
        run: |
          flutter gen-l10n
          git diff --exit-code lib/l10n

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test
