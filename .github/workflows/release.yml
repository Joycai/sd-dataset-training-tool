# Release pipeline: builds desktop bundles for Windows/macOS/Linux plus the
# AiApiServer source package, then creates a GitHub Release tagged from the
# version in pubspec.yaml (the single source of truth — see the sync-version
# skill in .claude/skills/).
#
# Trigger manually from the Actions tab once the version bump has landed on
# the target branch. The run fails fast if the release already exists or if
# lib/app_info.dart has drifted from pubspec.yaml.
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.7

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: read
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | tr -d ' \r' | cut -d: -f2 | cut -d+ -f1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from pubspec.yaml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Verify AppInfo.version matches pubspec.yaml
        run: |
          APP_VERSION=$(grep -oP "version = '\K[^']+" lib/app_info.dart)
          if [ "$APP_VERSION" != "${{ steps.read.outputs.version }}" ]; then
            echo "::error::lib/app_info.dart ($APP_VERSION) != pubspec.yaml (${{ steps.read.outputs.version }}). Run the sync-version skill."
            exit 1
          fi

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.read.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Bump the version first."
            exit 1
          fi

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "dataset-training-tool-${{ needs.version.outputs.version }}-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dataset-training-tool-*-windows-x64.zip
          if-no-files-found: error

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        # ditto preserves the .app bundle structure and resource forks that a
        # plain zip would mangle. The build is unsigned — first launch needs
        # right-click > Open (or `xattr -cr`), noted in the release body.
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          ditto -c -k --keepParent "$APP" \
            "dataset-training-tool-${{ needs.version.outputs.version }}-macos-universal.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dataset-training-tool-*-macos-universal.zip
          if-no-files-found: error

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: |
          tar -C build/linux/x64/release/bundle -czf \
            "dataset-training-tool-${{ needs.version.outputs.version }}-linux-x64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dataset-training-tool-*-linux-x64.tar.gz
          if-no-files-found: error

  package-server:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package AiApiServer source
        # Source-only package: the ML dependencies (torch, transformers, …)
        # are environment-specific and installed by the user per
        # AiApiServer/README.md, so shipping source + requirements.txt is the
        # whole story.
        run: |
          zip -r "ai-api-server-${{ needs.version.outputs.version }}.zip" AiApiServer \
            -x "AiApiServer/__pycache__/*" "AiApiServer/*/__pycache__/*"
      - uses: actions/upload-artifact@v4
        with:
          name: server
          path: ai-api-server-*.zip
          if-no-files-found: error

  release:
    needs: [version, build-windows, build-macos, build-linux, package-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
          body: |
            | 包 | 说明 |
            |---|---|
            | `*-windows-x64.zip` | 解压后运行 `dataset_training_tool.exe` |
            | `*-macos-universal.zip` | 未签名,首次启动请右键 > 打开(或 `xattr -cr`) |
            | `*-linux-x64.tar.gz` | 解压后运行 `dataset_training_tool`,需要 GTK3 |
            | `ai-api-server-*.zip` | AI 打标服务源码,依赖安装见包内 README.md |
