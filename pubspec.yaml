name: dataset_training_tool
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  http: ^1.2.2
  archive: ^4.0.9
  # TODO: pub.dev 发布 >0.3.0(含 macOS SPM 支持)后改回 hosted 版本依赖。
  # 上游 PR #482 (2026-06-22) 已合并 Swift Package Manager 支持但尚未发版,
  # 这里 pin 到 main 上包含该支持的 commit,同时带上 Windows 全屏修复。
  desktop_multi_window:
    git:
      url: https://github.com/MixinNetwork/flutter-plugins.git
      path: packages/desktop_multi_window
      ref: 021b6625608514c24cd84ca2773a2fa574e9b269
  file_saver: ^0.4.0
  reorderable_grid_view: ^2.2.8
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
