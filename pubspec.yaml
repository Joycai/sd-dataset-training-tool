name: dataset_training_tool
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  http: ^1.2.2
  archive: ^4.0.9
  desktop_multi_window: ^0.3.0
  file_saver: ^0.4.0
  reorderable_grid_view: ^2.2.8
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
